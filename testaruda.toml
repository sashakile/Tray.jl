# testaruda configuration for Tray.jl
# See: https://github.com/charly-vibes/testaruda

[adapters]
# Julia adapter — uses Testimonial.jl's protocol adapter for ReTestItems @testitem blocks
".jl" = "testaruda-adapter-julia"

# Default adapter
default = "testaruda-adapter-julia"

[discover]
# Julia test discovery: ReTestItems.jl @testitem blocks
paths = ["test/"]

# Exclude common build artifacts
exclude = ["target", ".git", "node_modules", ".venv", "venv",
          "__pycache__", ".mypy_cache", ".pytest_cache",
          "build", "dist", ".tox", "deps", "docs/build"]

[store]
path = ".testaruda"

[oracle]
# Soufflé Datalog oracle for cross-validation (optional)
enabled = false