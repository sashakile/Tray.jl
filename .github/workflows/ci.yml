name: Tray.jl CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      coverage:
        description: 'Upload coverage report'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1

      - name: Testaruda shadow select
        run: |
          if command -v testaruda &>/dev/null && command -v testaruda-adapter-julia &>/dev/null; then
            testaruda select --shadow
            rc=$?
            # shadow mode exits 10 intentionally ("all tests should run")
            [ $rc -eq 10 ] && exit 0 || exit $rc
          else
            echo "testaruda or adapter not available — skipping"
          fi

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    name: Lint / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/julia-buildpkg@v1

      - name: Check formatting
        run: julia --project=. -e 'using JuliaFormatter; all(format(path; verbose=true, check=true) for path in ("src", "test", "docs/make.jl")) || exit(1)'

      - name: Spell check
        uses: crate-ci/typos@master
        with:
          config: _typos.toml
