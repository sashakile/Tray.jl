name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Project.toml'
      - 'risk-tree-ears-spec.md'
      - 'openspec/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Project.toml'
      - 'risk-tree-ears-spec.md'
      - 'openspec/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Install dependencies
        run: |
          julia --project=docs -e '
          using Pkg
          Pkg.develop(Pkg.PackageSpec(path=pwd()))
          Pkg.instantiate()
          '

      - name: Build docs
        run: julia --project=docs docs/make.jl