# lefthook.yml — pre-commit hooks for Tray.jl
min_version: 1.11.0

pre-commit:
# ah:managed:start
  ah-check:
    run: ah check
# ah:managed:end

  parallel: true
  commands:
    julia-format:
      glob: "*.jl"
      run: >-
        bash -c 'for f in {staged_files}; do
        julia --project=. -e "using JuliaFormatter; exit(format(ARGS[1]; verbose=true, check=true) ? 0 : 1)" "$f" || exit;
        done'

    typos:
      glob: "*.{jl,md,toml,yml,yaml,txt}"
      run: typos {staged_files}

    eof-fixer:
      glob: "*"
      run: bash -c 'for f in {staged_files}; do [ -f "$f" ] && tail -c1 "$f" | read -r _ || echo >> "$f"; done'

pre-push:
  parallel: true
  commands:
    ci-test:
      run: julia --project=. -e 'using Pkg; Pkg.test()'

    ci-format:
      glob: "*.jl"
      run: >-
        bash -c 'for f in {push_files}; do
        julia --project=. -e "using JuliaFormatter; exit(format(ARGS[1]; verbose=true, check=true) ? 0 : 1)" "$f" || exit;
        done'

    ci-spell:
      glob: "*.{jl,md,toml,yml,yaml,txt}"
      run: typos .

    testaruda-shadow:
      run: testaruda select --shadow
